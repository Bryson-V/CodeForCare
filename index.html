<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CodeForCare Lab Runner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav style="margin-bottom: 20px; padding: 10px; border-bottom: 1px solid #ccc;">
        <strong>Select a Workshop:</strong>
        <a href="?workshop=1" style="margin-left: 15px;">Workshop 1</a>
        <a href="?workshop=2" style="margin-left: 15px;">Workshop 2</a>
        <a href="?workshop=3" style="margin-left: 15px;">Workshop 3</a>
    </nav>

    <div class="workspace" style="display: flex; gap: 20px; padding: 20px;">
        
        <div class="panel" style="flex: 1;">
            <h1 id="lab-title">Loading Lab...</h1>
            <div id="lab-description"></div>
            <button id="run-btn">Run Test Cases</button>
        </div>

        <div class="panel" style="flex: 1.5; border: 1px solid #ccc; padding: 15px; border-radius: 8px;">
            <h2>Live Preview</h2>
            <iframe id="preview-frame" width="100%" height="600px"></iframe>
        </div>

        <div class="panel" style="flex: 1;">
            <h2>Test Results</h2>
            <div id="results">Click "Run Test Cases" to see results.</div>
        </div>
    </div>

    <script>
        // 1. Get the 'workshop' number from the URL
        const params = new URLSearchParams(window.location.search);
        const workshopNum = params.get('workshop') || '1';

        // 2. Set the iframe source dynamically to the HTML file in that folder
        const iframe = document.getElementById('preview-frame');
        // This assumes index.html is inside each Workshop folder
        iframe.src = `/Labs/Workshop${workshopNum}/index.html`;
    </script>

    <script type="module" src="/src/app.js"></script>
    
</body>
</html>
