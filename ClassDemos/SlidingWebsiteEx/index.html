<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Sliding Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="image-track" data-mouse-down-at="0" data-prev-percentage="0">
        <img class="image" src="assets/CafeMug.jpg" draggable="false" />
        <img class="image" src="assets/Cat.jpg" draggable="false" />
        <img class="image" src="assets/Computer.jpg" draggable="false" />
        <img class="image" src="assets/Guam.jpg" draggable="false" />
        <img class="image" src="assets/Toaster.jpg" draggable="false" />
    </div>

    <script src="script.js"></script>
</body>
</html>
