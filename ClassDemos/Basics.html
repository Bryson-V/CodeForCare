<!DOCTYPE html>
<html lang="en">
<!-- Always keep these two lines above.  Won't need to ever change  -->
<link rel="stylesheet" href="Basics.css">
<!--Link to css file if needed-->

<!-- Contains invisible metadata and settings for the page -->
<head>
    <!-- Important to have! Character encoding for text (Supports special characters and emojis) -->
    <meta charset="UTF-8">

    <!-- Viewport settings for responsiveness on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- The title to be displayed on the browser tab -->
    <title>My First Webpage</title>
</head>

<!-- Everything inside here is visible on the webpage -->
<body>

    <!-- Main Title / Primary Heading (Use only one h1 per page) -->
    <h1>Main Page Title</h1>

    <!-- Subheading Level 2 (For major sub-sections) -->
    <h2>Section Title</h2>

    <!-- Subheading Level 3 (For sub-sections within h2) -->
    <h3>Subsection Title</h3>

    <!-- Subheading Level 4 -->
    <h4>Smaller Subsection Title</h4>

    <!-- Subheading Level 5 -->
    <h5>Minor Heading</h5>

    <!-- Subheading Level 6 (The smallest heading tag) -->
    <h6>Smallest Heading</h6>

    <!-- Paragraph tag for standard body text -->
    <p>This is a standard paragraph of text.</p>

    <div class="main-container">
        <h1>Header</h1>
        <p>Text here</p>
        <button type="button">Click Me</button>
    </div>

</body>

<!-- Unordered list with items in it -->
<ol>
	<li> Item 1 </li>
	<li> Item 2 </li>
</ol>
<button type="button">Button</button>
<a href="https://www.youtube.com/watch?v=IlDcpgDDxDw&list=RDIlDcpgDDxDw&start_radio=1" target = “_blank"> link to video</a>

<!-- Keep the close /html at the bottom of page.  Rarely need to have it in middle  -->
</html>
