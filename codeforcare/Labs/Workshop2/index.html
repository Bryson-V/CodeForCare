<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Grid Challenge Solution</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card {
            border: 2px solid #333;
            border-radius: 10px;
            padding: 20px;
            background: #f4f4f4;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>My Grid Challenge</h1>

    <div class="grid-container">

        <div class="card">
            <h3>Card One</h3>
            <p>This is the first card.</p>
            <button>Click Me</button>
        </div>

        <div class="card">
            <h3>Card Two</h3>
            <p>This is the second card.</p>
            <button>Click Me</button>
        </div>

        <div class="card">
            <h3>Card Three</h3>
            <p>This is the third card.</p>
            <button>Click Me</button>
        </div>

    </div>

</body>

</html>
